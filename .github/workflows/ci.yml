name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        go: ["1.23", "1.26"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: golangci-lint
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
